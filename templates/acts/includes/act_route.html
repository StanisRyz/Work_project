<section class="act-route" aria-label="Маршрут акта">
    <span class="act-route__step{% if status_code == 'CREATED_OTK' %} act-route__step--current{% endif %}">ОТК</span>
    <span class="act-route__step{% if status_code == 'KO_REVIEW' %} act-route__step--current{% endif %}">КО</span>
    <span class="act-route__step{% if status_code == 'TO_ANALYSIS' %} act-route__step--current{% endif %}">ТО</span>
    <span class="act-route__step{% if status_code == 'ACTIONS_ASSIGNED' %} act-route__step--current{% endif %}">Мероприятия</span>
    <span class="act-route__step{% if status_code == 'CLOSED' %} act-route__step--current act-route__step--final{% endif %}">Закрытие</span>
</section>
