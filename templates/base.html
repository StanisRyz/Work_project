{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Единая цифровая экосистема управления качеством{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/acts.css' %}">
</head>
<body>
    <div class="app-shell">
        {% include 'includes/sidebar.html' %}
        <div class="app-main">
            {% include 'includes/header.html' %}
            <main class="content page-container">
                {% if messages %}
                    <section class="message-list" aria-label="Сообщения">
                        {% for message in messages %}
                            <div class="message message--{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </section>
                {% endif %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
